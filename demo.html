<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minesweeper Pro - Демо</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .cell-hidden { background: #cbd5e1; border: 2px solid #94a3b8; }
    .cell-revealed { background: #f1f5f9; border: 1px solid #e2e8f0; }
    .cell-mine { background: #fee2e2; border: 1px solid #fecaca; }
    .cell-flag { background: #fef3c7; border: 2px solid #fbbf24; }
    .dark .cell-hidden { background: #334155; border-color: #475569; }
    .dark .cell-revealed { background: #1e293b; border-color: #334155; }
    .dark .cell-mine { background: #450a0a; border-color: #7f1d1d; }
    .dark .cell-flag { background: #451a03; border-color: #92400e; }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' },
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ============ GAME LOGIC ============
    function seededRandom(seed) {
      let hash = 0;
      for (let i = 0; i < seed.length; i++) {
        const char = seed.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return () => {
        hash = (hash * 16807) % 2147483647;
        return (hash - 1) / 2147483646;
      };
    }

    function createBoard(width, height, mines, seed) {
      const board = Array(height).fill(null).map((_, y) =>
        Array(width).fill(null).map((_, x) => ({
          x, y, isMine: false, isRevealed: false, isFlagged: false, neighborMines: 0
        }))
      );

      const rng = seed ? seededRandom(seed) : Math.random;
      const positions = [];
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) positions.push([x, y]);
      }

      for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
      }

      for (let i = 0; i < mines && i < positions.length; i++) {
        const [x, y] = positions[i];
        board[y][x].isMine = true;
      }

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          if (!board[y][x].isMine) {
            let count = 0;
            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                const ny = y + dy, nx = x + dx;
                if (ny >= 0 && ny < height && nx >= 0 && nx < width && board[ny][nx].isMine) count++;
              }
            }
            board[y][x].neighborMines = count;
          }
        }
      }
      return board;
    }

    function revealCell(board, x, y) {
      const newBoard = board.map(row => row.map(cell => ({...cell})));
      const cell = newBoard[y][x];
      if (cell.isRevealed || cell.isFlagged) return newBoard;

      cell.isRevealed = true;
      if (cell.neighborMines === 0 && !cell.isMine) {
        const queue = [[x, y]];
        const visited = new Set([`${x},${y}`]);
        while (queue.length > 0) {
          const [cx, cy] = queue.shift();
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = cx + dx, ny = cy + dy;
              if (ny >= 0 && ny < newBoard.length && nx >= 0 && nx < newBoard[0].length) {
                const key = `${nx},${ny}`;
                if (!visited.has(key)) {
                  visited.add(key);
                  const neighbor = newBoard[ny][nx];
                  if (!neighbor.isRevealed && !neighbor.isFlagged && !neighbor.isMine) {
                    neighbor.isRevealed = true;
                    if (neighbor.neighborMines === 0) queue.push([nx, ny]);
                  }
                }
              }
            }
          }
        }
      }
      return newBoard;
    }

    function checkWin(board) {
      return board.every(row => row.every(cell => cell.isMine || cell.isRevealed));
    }

    function checkLoss(board) {
      return board.some(row => row.some(cell => cell.isMine && cell.isRevealed));
    }

    function getFlagCount(board) {
      return board.flat().filter(c => c.isFlagged).length;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function calculateProbabilities(board) {
      const newBoard = board.map(row => row.map(cell => ({...cell, probability: undefined, isSafe: undefined, isMineCertain: undefined})));
      const height = board.length, width = board[0].length;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const cell = newBoard[y][x];
          if (cell.isRevealed && cell.neighborMines > 0) {
            const neighbors = [];
            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                if (dx === 0 && dy === 0) continue;
                const ny = y + dy, nx = x + dx;
                if (ny >= 0 && ny < height && nx >= 0 && nx < width) neighbors.push(newBoard[ny][nx]);
              }
            }
            const hidden = neighbors.filter(n => !n.isRevealed && !n.isFlagged);
            const flagged = neighbors.filter(n => n.isFlagged);
            const minesLeft = cell.neighborMines - flagged.length;

            if (hidden.length === 0) continue;
            if (minesLeft === hidden.length) {
              hidden.forEach(n => { n.isMineCertain = true; n.probability = 1; });
            } else if (minesLeft === 0) {
              hidden.forEach(n => { n.isSafe = true; n.probability = 0; });
            } else {
              const prob = minesLeft / hidden.length;
              hidden.forEach(n => { if (n.probability === undefined || prob > n.probability) n.probability = prob; });
            }
          }
        }
      }

      const totalMines = board.flat().filter(c => c.isMine).length;
      const flaggedCount = board.flat().filter(c => c.isFlagged).length;
      const revealedCount = board.flat().filter(c => c.isRevealed).length;
      const unknownCells = width * height - revealedCount - flaggedCount;
      const remainingMines = totalMines - flaggedCount;
      const globalProb = unknownCells > 0 ? remainingMines / unknownCells : 0;

      for (const row of newBoard) {
        for (const cell of row) {
          if (!cell.isRevealed && !cell.isFlagged && cell.probability === undefined) {
            cell.probability = globalProb;
          }
        }
      }
      return newBoard;
    }

    // ============ COMPONENTS ============
    function Cell({ cell, size, onReveal, onFlag, showProbability }) {
      const handleClick = (e) => { e.preventDefault(); onReveal(cell.x, cell.y); };
      const handleRightClick = (e) => { e.preventDefault(); onFlag(cell.x, cell.y); };

      const getClass = () => {
        if (cell.isFlagged) return 'cell-flag flex items-center justify-center';
        if (!cell.isRevealed) return 'cell-hidden flex items-center justify-center cursor-pointer active:scale-95';
        if (cell.isMine) return 'cell-mine flex items-center justify-center';
        return 'cell-revealed flex items-center justify-center';
      };

      const getContent = () => {
        if (cell.isFlagged) return '⚑';
        if (!cell.isRevealed) return '';
        if (cell.isMine) return '💣';
        if (cell.neighborMines > 0) return cell.neighborMines;
        return '';
      };

      const getColor = () => {
        if (!cell.isRevealed || cell.isMine) return '';
        const colors = ['', 'text-blue-600', 'text-green-600', 'text-red-600', 'text-purple-600', 'text-yellow-600', 'text-pink-600', 'text-gray-900', 'text-gray-700'];
        return colors[cell.neighborMines] || '';
      };

      const probRing = showProbability && !cell.isRevealed && !cell.isFlagged && cell.probability !== undefined
        ? (cell.probability === 0 ? 'ring-2 ring-green-500' : 
           cell.probability === 1 ? 'ring-2 ring-red-500' :
           cell.probability < 0.3 ? 'ring-1 ring-green-400' :
           cell.probability < 0.6 ? 'ring-1 ring-yellow-400' :
           'ring-1 ring-red-400')
        : '';

      return (
        <div
          className={`${getClass()} ${getColor()} ${probRing} rounded-sm transition-all`}
          style={{ width: size, height: size, fontSize: size * 0.5, fontWeight: 'bold' }}
          onClick={handleClick}
          onContextMenu={handleRightClick}
        >
          {getContent()}
          {showProbability && !cell.isRevealed && !cell.isFlagged && cell.probability !== undefined && (
            <span className="absolute -top-1 -right-1 w-3 h-3 bg-gray-800 text-white text-[8px] rounded-full flex items-center justify-center">
              {Math.round(cell.probability * 100)}
            </span>
          )}
        </div>
      );
    }

    function GameBoard({ board, onReveal, onFlag, showProbability }) {
      const size = 36;
      return (
        <div className="flex justify-center overflow-auto">
          <div className="inline-grid gap-0.5 p-2 bg-gray-300 dark:bg-gray-700 rounded-lg"
               style={{ gridTemplateColumns: `repeat(${board[0].length}, ${size}px)` }}>
            {board.map((row, y) => row.map((cell, x) => (
              <div key={`${x}-${y}`} className="relative">
                <Cell cell={cell} size={size} onReveal={onReveal} onFlag={onFlag} showProbability={showProbability} />
              </div>
            )))}
          </div>
        </div>
      );
    }

    function AICoach({ board, showProbability, onToggle }) {
      if (!showProbability) {
        return (
          <div className="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-4 border border-blue-200 dark:border-blue-800">
            <div className="flex items-center justify-between">
              <div>
                <h3 className="font-semibold">🧠 AI Coach</h3>
                <p className="text-sm text-gray-500">Включите подсказки для анализа вероятностей</p>
              </div>
              <button onClick={onToggle} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Включить
              </button>
            </div>
          </div>
        );
      }

      const boardWithProbs = calculateProbabilities(board);
      let safest = null, lowestProb = 1;
      for (const row of boardWithProbs) {
        for (const cell of row) {
          if (!cell.isRevealed && !cell.isFlagged && cell.probability !== undefined && cell.probability < lowestProb) {
            lowestProb = cell.probability;
            safest = cell;
          }
        }
      }

      if (!safest) return null;

      const probPercent = Math.round(lowestProb * 100);
      const message = safest.isSafe ? '✅ Эту клетку можно безопасно открыть!' :
                      safest.isMineCertain ? '💣 Здесь точно мина — ставьте флаг!' :
                      probPercent < 30 ? `🟢 Относительно безопасно (${probPercent}% риска)` :
                      `🟡 Придётся рисковать (${probPercent}% риска)`;

      return (
        <div className={`rounded-xl p-4 border ${
          safest.isSafe ? 'bg-green-50 border-green-200' :
          safest.isMineCertain ? 'bg-red-50 border-red-200' :
          probPercent < 30 ? 'bg-green-50 border-green-200' :
          'bg-yellow-50 border-yellow-200'
        }`}>
          <div className="flex items-start gap-3">
            <span className="text-xl">{safest.isSafe ? '💡' : safest.isMineCertain ? '⚠️' : '🎯'}</span>
            <div>
              <p className="font-medium">{message}</p>
              <p className="text-sm text-gray-500 mt-1">
                {safest.isSafe ? 'Все соседние мины уже найдены.' :
                 safest.isMineCertain ? 'Количество скрытых соседей = оставшимся минам.' :
                 `Вероятность мины: ${probPercent}%`}
              </p>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [board, setBoard] = useState(() => createBoard(8, 8, 10, 'demo'));
      const [status, setStatus] = useState('idle');
      const [difficulty, setDifficulty] = useState('beginner');
      const [time, setTime] = useState(0);
      const [flags, setFlags] = useState(0);
      const [moves, setMoves] = useState(0);
      const [showAI, setShowAI] = useState(false);
      const [startTime, setStartTime] = useState(null);
      const [darkMode, setDarkMode] = useState(false);

      const configs = {
        beginner: { w: 8, h: 8, m: 10 },
        intermediate: { w: 16, h: 16, m: 40 },
        expert: { w: 30, h: 16, m: 99 },
      };

      useEffect(() => {
        if (status === 'playing' && startTime) {
          const interval = setInterval(() => setTime(Math.floor((Date.now() - startTime) / 1000)), 1000);
          return () => clearInterval(interval);
        }
      }, [status, startTime]);

      const newGame = (diff) => {
        const cfg = configs[diff];
        setBoard(createBoard(cfg.w, cfg.h, cfg.m, Math.random().toString(36)));
        setStatus('idle');
        setDifficulty(diff);
        setTime(0);
        setFlags(0);
        setMoves(0);
        setStartTime(null);
      };

      const handleReveal = (x, y) => {
        if (status === 'won' || status === 'lost') return;

        let newBoard = board.map(row => row.map(c => ({...c})));

        if (status === 'idle') {
          const cell = newBoard[y][x];
          if (cell.isMine) {
            for (let yy = 0; yy < newBoard.length; yy++) {
              for (let xx = 0; xx < newBoard[0].length; xx++) {
                if (!newBoard[yy][xx].isMine && (xx !== x || yy !== y)) {
                  newBoard[y][x].isMine = false;
                  newBoard[yy][xx].isMine = true;

                  for (let y2 = 0; y2 < newBoard.length; y2++) {
                    for (let x2 = 0; x2 < newBoard[0].length; x2++) {
                      if (!newBoard[y2][x2].isMine) {
                        let count = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                          for (let dx = -1; dx <= 1; dx++) {
                            const ny = y2 + dy, nx = x2 + dx;
                            if (ny >= 0 && ny < newBoard.length && nx >= 0 && nx < newBoard[0].length && newBoard[ny][nx].isMine) count++;
                          }
                        }
                        newBoard[y2][x2].neighborMines = count;
                      }
                    }
                  }
                  yy = newBoard.length; xx = newBoard[0].length; break;
                }
              }
            }
          }
          newBoard = revealCell(newBoard, x, y);
          if (showAI) newBoard = calculateProbabilities(newBoard);
          setBoard(newBoard);
          setStatus('playing');
          setStartTime(Date.now());
          setMoves(1);
          return;
        }

        if (newBoard[y][x].isFlagged || newBoard[y][x].isRevealed) return;
        newBoard = revealCell(newBoard, x, y);

        if (checkLoss(newBoard)) {
          newBoard.forEach(row => row.forEach(c => { if (c.isMine) c.isRevealed = true; }));
          setBoard(newBoard);
          setStatus('lost');
          return;
        }

        if (checkWin(newBoard)) {
          setBoard(newBoard);
          setStatus('won');
          return;
        }

        if (showAI) newBoard = calculateProbabilities(newBoard);
        setBoard(newBoard);
        setMoves(m => m + 1);
      };

      const handleFlag = (x, y) => {
        if (status !== 'playing' && status !== 'idle') return;
        const newBoard = board.map(row => row.map(c => ({...c})));
        if (newBoard[y][x].isRevealed) return;
        newBoard[y][x].isFlagged = !newBoard[y][x].isFlagged;
        setBoard(showAI ? calculateProbabilities(newBoard) : newBoard);
        setFlags(getFlagCount(newBoard));
      };

      const minesLeft = configs[difficulty].m - flags;

      return (
        <div className={`min-h-screen ${darkMode ? 'dark bg-gray-900 text-white' : 'bg-gray-50 text-gray-900'}`}>
          <div className="container mx-auto px-4 py-6 max-w-4xl">
            {/* Header */}
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl">
                  💣
                </div>
                <div>
                  <h1 className="text-xl font-bold">Minesweeper Pro</h1>
                  <p className="text-sm text-gray-500">Тренируй вероятностное мышление</p>
                </div>
              </div>
              <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-lg bg-gray-200 dark:bg-gray-700">
                {darkMode ? '☀️' : '🌙'}
              </button>
            </div>

            {/* Difficulty */}
            <div className="flex justify-center gap-2 mb-4 flex-wrap">
              {Object.keys(configs).map(d => (
                <button key={d} onClick={() => newGame(d)}
                  className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${
                    difficulty === d ? 'bg-blue-600 text-white shadow-lg' : 'bg-gray-200 dark:bg-gray-700'
                  }`}>
                  {d === 'beginner' ? 'Новичок' : d === 'intermediate' ? 'Любитель' : 'Эксперт'}
                </button>
              ))}
            </div>

            {/* Stats */}
            <div className="flex items-center justify-between bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl p-3 mb-4 shadow-sm">
              <div className="flex gap-4">
                <span className="font-medium">💣 {minesLeft}</span>
                <span className="font-mono font-bold">⏱️ {formatTime(time)}</span>
                <span className="text-gray-500">🚩 {flags}/{configs[difficulty].m}</span>
              </div>
              <button onClick={() => newGame(difficulty)} className="px-3 py-1 bg-gray-100 dark:bg-gray-700 rounded-lg text-sm hover:bg-gray-200">
                🔄 Новая игра
              </button>
            </div>

            {/* AI Coach */}
            {status === 'playing' && (
              <div className="mb-4">
                <AICoach board={board} showProbability={showAI} onToggle={() => setShowAI(!showAI)} />
              </div>
            )}

            {/* Board */}
            {status === 'idle' ? (
              <div className="text-center py-12">
                <div className="text-6xl mb-4">✨</div>
                <h2 className="text-xl font-bold mb-2">Готовы начать?</h2>
                <p className="text-gray-500 mb-4">Выберите сложность и сделайте первый ход</p>
                <button onClick={() => setStatus('playing')} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700">
                  ▶️ Начать игру
                </button>
              </div>
            ) : (
              <GameBoard board={board} onReveal={handleReveal} onFlag={handleFlag} showProbability={showAI} />
            )}

            {/* Game Over */}
            {(status === 'won' || status === 'lost') && (
              <div className={`mt-4 p-6 rounded-xl text-center border-2 ${
                status === 'won' ? 'bg-green-50 border-green-500 dark:bg-green-900/20' : 'bg-red-50 border-red-500 dark:bg-red-900/20'
              }`}>
                <div className="text-5xl mb-2">{status === 'won' ? '🎉' : '💥'}</div>
                <h2 className="text-2xl font-bold">{status === 'won' ? 'Победа!' : 'Взрыв!'}</h2>
                <p className="text-gray-500 mt-2">
                  {status === 'won' ? `Время: ${formatTime(time)}, Ходов: ${moves}` : 'Мина взорвалась. Попробуйте ещё раз!'}
                </p>
                <div className="flex gap-2 justify-center mt-4">
                  <button onClick={() => newGame(difficulty)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    🔄 Ещё раз
                  </button>
                </div>
              </div>
            )}

            {/* Features */}
            <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-3">
              {[
                { icon: '🧠', label: 'AI Coach', desc: showAI ? 'Включен' : 'Выключен' },
                { icon: '🏆', label: 'Рекорд', desc: '12с' },
                { icon: '📐', label: 'Размер', desc: `${configs[difficulty].w}×${configs[difficulty].h}` },
                { icon: '🎯', label: 'Статус', desc: status === 'won' ? 'Победа' : status === 'lost' ? 'Поражение' : 'В игре' },
              ].map((item, i) => (
                <div key={i} className="bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl p-3">
                  <div className="text-2xl mb-1">{item.icon}</div>
                  <div className="text-xs text-gray-500">{item.label}</div>
                  <div className="font-medium text-sm">{item.desc}</div>
                </div>
              ))}
            </div>

            {/* Footer */}
            <div className="mt-8 text-center text-sm text-gray-400">
              <p>Minesweeper Pro — React + TypeScript + Tailwind</p>
              <p className="mt-1">AI Coach • Daily Challenge • Leaderboard • Pro</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
